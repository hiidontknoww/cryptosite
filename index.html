<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite</title>
<style>
  :root {
    --accent: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { 
    height: 100%; 
    background: #000; 
    color: #ddd; 
    font-family: "Helvetica Neue", Arial, sans-serif; 
    overflow: hidden; 
    cursor: default; 
  }

  .screen { 
    position: fixed; 
    inset: 0; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    padding: 24px; 
    transition: all 1.4s cubic-bezier(0.23, 1, 0.32, 1);
    z-index: 2;
  }

  /* Galaxy Background */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 1;
    opacity: 0.85;
  }

  #enter-screen { z-index: 10; }
  #enter-screen.fall { 
    transform: scale(7.5) translateY(120px); 
    opacity: 0; 
    filter: blur(28px); 
  }

  #enter-btn {
    position: relative;
    background: transparent;
    border: 1px solid #fff;
    color: #fff;
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 14px;
    font-size: 16px;
    padding: 24px 72px;
    border-radius: 60px;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
    box-shadow: 0 0 50px rgba(255,255,255,0.15);
  }
  #enter-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
    transform: translateX(-180%);
    transition: transform 1s ease;
  }
  #enter-btn:hover {
    letter-spacing: 22px;
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 70px rgba(255,255,255,0.4);
  }
  #enter-btn:hover::before { transform: translateX(280%); }

  #pass-screen {
    opacity: 0;
    pointer-events: none;
    transform: translateY(80px);
  }
  #pass-screen.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .lock {
    font-size: 11px;
    letter-spacing: 9px;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 55px;
    font-weight: 300;
  }

  #pass-input {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.35);
    color: #fff;
    font-size: 19px;
    font-weight: 300;
    letter-spacing: 14px;
    text-align: center;
    padding: 22px 45px;
    width: min(400px, 88vw);
    border-radius: 60px;
    outline: none;
    transition: all 0.5s ease;
  }
  #pass-input::placeholder { color: #444; letter-spacing: 8px; }
  #pass-input:focus {
    border-color: #fff;
    box-shadow: 0 0 40px rgba(255,255,255,0.3);
  }
  #pass-input.error {
    border-color: #888;
    animation: shake 0.6s;
  }

  #connect-btn {
    margin-top: 45px;
    background: transparent;
    border: 1px solid #fff;
    color: #fff;
    font-size: 13.5px;
    letter-spacing: 7px;
    padding: 17px 55px;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.6s ease;
  }
  #connect-btn:hover {
    background: #fff;
    color: #000;
    letter-spacing: 11px;
  }

  #pass-hint {
    margin-top: 32px;
    font-size: 11px;
    letter-spacing: 3px;
    color: #777;
    min-height: 20px;
  }

  #member-screen {
    opacity: 0;
    pointer-events: none;
  }
  #member-screen.show {
    opacity: 1;
    pointer-events: auto;
  }

  #member-screen h1 {
    font-weight: 200;
    font-size: clamp(38px, 8.5vw, 86px);
    letter-spacing: clamp(10px, 3.5vw, 22px);
    text-transform: uppercase;
    color: #fff;
    text-align: center;
    margin-bottom: 12px;
    text-shadow: 0 0 40px rgba(255,255,255,0.6);
  }

  #member-screen p {
    color: #777;
    letter-spacing: 6px;
    font-size: 13.5px;
    text-transform: uppercase;
  }

  .terminal {
    width: min(860px, 94vw);
    min-height: 340px;
    margin-top: 45px;
    padding: 30px;
    background: rgba(5,5,5,0.92);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 18px;
    box-shadow: 0 35px 90px rgba(0,0,0,0.8),
                inset 0 0 80px rgba(255,255,255,0.06);
    font: 13.8px/1.8 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    color: #ccc;
    position: relative;
    overflow: hidden;
  }

  .terminal::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      transparent 0px,
      transparent 3px,
      rgba(255,255,255,0.04) 3px,
      rgba(255,255,255,0.04) 6px
    );
    animation: scanline 8s linear infinite;
    pointer-events: none;
  }

  @keyframes scanline {
    0% { transform: translateY(-150%); }
    100% { transform: translateY(500%); }
  }

  .terminal-bar {
    display: flex;
    gap: 9px;
    margin-bottom: 22px;
  }
  .terminal-bar i {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #222;
  }

  #terminal-output {
    white-space: pre-wrap;
    overflow-wrap: anywhere;
    min-height: 200px;
  }

  .cursor {
    display: inline-block;
    width: 9px;
    height: 19px;
    background: #ddd;
    vertical-align: middle;
    animation: blink 0.65s steps(1) infinite;
  }

  .privacy {
    max-width: 620px;
    color: #444;
    text-align: center;
    font-size: 10px;
    line-height: 1.7;
    letter-spacing: 1.5px;
    margin-top: 35px;
  }

  @keyframes blink { 50% { opacity: 0; } }
  @keyframes shake { 
    0%,100%{transform:translateX(0)} 
    25%{transform:translateX(-10px)} 
    75%{transform:translateX(10px)} 
  }
</style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div id="enter-screen" class="screen">
    <button id="enter-btn">Entrée</button>
  </div>

  <div id="pass-screen" class="screen">
    <div class="lock">Accès réservé aux membres</div>
    <input id="pass-input" type="password" placeholder="••••••" autocomplete="off" spellcheck="false">
    <button id="connect-btn">Se connecter</button>
    <div id="pass-hint" aria-live="polite"></div>
  </div>

  <div id="member-screen" class="screen">
    <h1>Elite</h1>
    <p>Accès accordé</p>
    
    <button id="locate-btn">Ouvrir le Terminal</button>

    <section id="terminal" class="terminal">
      <div class="terminal-bar"><i></i><i></i><i></i></div>
      <span id="terminal-output"></span><span class="cursor"></span>
    </section>

    <p class="privacy">Interface sécurisée • Aucune donnée collectée</p>
  </div>

<script>
  const PASSWORD = "elite2026";
  const $ = id => document.getElementById(id);

  const enterScreen = $("enter-screen");
  const enterBtn = $("enter-btn");
  const passScreen = $("pass-screen");
  const passInput = $("pass-input");
  const connectBtn = $("connect-btn");
  const passHint = $("pass-hint");
  const memberScreen = $("member-screen");
  const locateBtn = $("locate-btn");
  const output = $("terminal-output");

  const canvas = $("bg-canvas");
  const ctx = canvas.getContext("2d");

  let stars = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener("resize", resizeCanvas);
  resizeCanvas();

  class Star {
    constructor() {
      this.reset();
    }
    reset() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.size = Math.random() * 2.4 + 0.7;
      this.speed = Math.random() * 0.15 + 0.05;
      this.opacity = Math.random() * 0.9 + 0.4;
      this.twinkleSpeed = Math.random() * 0.03 + 0.015;
      this.twinkle = Math.random() * Math.PI * 2;
    }
    update() {
      this.twinkle += this.twinkleSpeed;
      this.opacity = 0.5 + Math.sin(this.twinkle) * 0.5;
      this.y += this.speed;
      if (this.y > canvas.height) this.reset();
    }
    draw() {
      ctx.fillStyle = `rgba(255,255,255,${this.opacity})`;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fill();

      // Occasional bigger flare
      if (Math.random() < 0.008) {
        ctx.fillStyle = `rgba(255,255,255,${this.opacity * 0.6})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 2.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  function initStars() {
    stars = [];
    const count = Math.floor((canvas.width * canvas.height) / 2800);
    for (let i = 0; i < count; i++) {
      stars.push(new Star());
    }
  }

  function animateGalaxy() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.12)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let star of stars) {
      star.update();
      star.draw();
    }
    requestAnimationFrame(animateGalaxy);
  }

  const wait = ms => new Promise(r => setTimeout(r, ms));

  async function typeLine(text, speed = 20) {
    for (let char of text) {
      output.textContent += char;
      await wait(speed + Math.random() * 22);
    }
    output.textContent += "\n";
  }

  enterBtn.addEventListener("click", () => {
    enterScreen.classList.add("fall");
    setTimeout(() => {
      enterScreen.style.display = "none";
      passScreen.classList.add("show");
      passInput.focus();
    }, 1600);
  });

  function tryPassword() {
    if (passInput.value === PASSWORD) {
      passScreen.classList.remove("show");
      setTimeout(() => {
        passScreen.style.display = "none";
        memberScreen.classList.add("show");
      }, 950);
    } else {
      passInput.classList.add("error");
      passHint.textContent = "Clé d'accès invalide";
      passInput.value = "";
      setTimeout(() => {
        passInput.classList.remove("error");
        passHint.textContent = "";
      }, 1400);
    }
  }

  connectBtn.addEventListener("click", tryPassword);
  passInput.addEventListener("keydown", e => {
    if (e.key === "Enter") tryPassword();
  });

  locateBtn.addEventListener("click", async () => {
    locateBtn.disabled = true;
    locateBtn.textContent = "Connexion...";
    output.textContent = "";

    await typeLine("> Initialisation du terminal...", 18);
    await wait(350);
    await typeLine("> Synchronisation réseau...", 22);
    await typeLine("STATUT : EN LIGNE", 26);
    await typeLine("> Accès Vault autorisé", 24);
    await wait(400);
    await typeLine("Bienvenue dans l'interface Elite.", 28);

    locateBtn.textContent = "Rafraîchir";
    locateBtn.disabled = false;
  });

  window.addEventListener("load", () => {
    initStars();
    animateGalaxy();
  });
</script>
</body>
</html>
