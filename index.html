<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite</title>
<style>
  :root { --accent: #000; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { 
    height: 100%; 
    background: #fff; 
    color: #000; 
    font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif; 
    overflow: hidden; 
  }

  .screen { 
    position: fixed; 
    inset: 0; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    padding: 24px 20px; 
    z-index: 10;
    transition: all 1.6s cubic-bezier(0.6, 0, 0.2, 1);
  }

  #enter-screen { z-index: 20; background: #fff; }
  #enter-screen.zoom-out { 
    transform: scale(12); 
    opacity: 0; 
  }

  #enter-btn {
    background: #000;
    color: #fff;
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 12px;
    font-size: clamp(16px, 5vw, 19px);
    padding: 24px 72px;
    border-radius: 9999px;
    cursor: pointer;
    border: none;
    transition: all 0.8s ease;
    z-index: 30;
  }
  #enter-btn:hover {
    letter-spacing: 18px;
    background: #111;
    transform: scale(1.05);
  }

  #pass-screen {
    opacity: 0;
    pointer-events: none;
    transform: translateY(40px);
    background: #fff;
  }
  #pass-screen.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .lock { 
    font-size: clamp(11px, 3.5vw, 13px); 
    letter-spacing: 8px; 
    color: #555; 
    text-transform: uppercase; 
    margin-bottom: 50px; 
    text-align: center; 
  }

  #pass-input {
    background: transparent;
    border: 2px solid #000;
    color: #000;
    font-size: clamp(19px, 6vw, 23px);
    letter-spacing: 12px;
    text-align: center;
    padding: 22px 40px;
    width: 100%;
    max-width: 380px;
    border-radius: 9999px;
    outline: none;
  }
  #pass-input:focus { border-color: #000; box-shadow: 0 0 0 4px rgba(0,0,0,0.1); }
  #pass-input.error { border-color: #c00; }

  #connect-btn {
    margin-top: 38px;
    background: #000;
    color: #fff;
    font-size: clamp(13px, 4vw, 15px);
    letter-spacing: 8px;
    padding: 16px 56px;
    border-radius: 9999px;
    cursor: pointer;
    border: none;
    transition: all 0.6s ease;
  }
  #connect-btn:hover { background: #222; letter-spacing: 12px; }

  #pass-hint { 
    margin-top: 28px; 
    font-size: clamp(10px, 3.2vw, 12px); 
    letter-spacing: 2px; 
    color: #c00; 
    min-height: 24px; 
  }

  #member-screen { 
    opacity: 0; 
    pointer-events: none; 
    background: #fff; 
  }
  #member-screen.show { 
    opacity: 1; 
    pointer-events: auto; 
  }

  #member-screen h1 {
    font-weight: 200;
    font-size: clamp(42px, 12vw, 78px);
    letter-spacing: clamp(10px, 5vw, 20px);
    text-transform: uppercase;
    color: #000;
    text-align: center;
  }

  #member-screen p {
    color: #555;
    letter-spacing: 6px;
    font-size: clamp(13px, 4vw, 15px);
    text-transform: uppercase;
    margin-top: 12px;
  }

  .terminal {
    width: 100%;
    max-width: 820px;
    min-height: 320px;
    margin-top: 40px;
    padding: 26px;
    background: #111;
    color: #ddd;
    border-radius: 20px;
    font: clamp(13px, 3.5vw, 14.5px)/1.75 ui-monospace, monospace;
    position: relative;
    overflow: hidden;
  }

  .terminal::before {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(transparent 0px, transparent 4px, rgba(255,255,255,0.08) 4px, rgba(255,255,255,0.08) 8px);
    animation: scanline 7s linear infinite;
  }

  @keyframes scanline { 0% { transform: translateY(-150%); } 100% { transform: translateY(500%); } }

  .terminal-bar { display:flex; gap:8px; margin-bottom:20px; }
  .terminal-bar i { width:10px; height:10px; border-radius:50%; background:#666; }

  #terminal-output { white-space: pre-wrap; min-height: 190px; }
  .cursor { display: inline-block; width: 8px; height: 19px; background: #fff; animation: blink 0.75s infinite; }

  .privacy {
    max-width: 580px;
    color: #666;
    text-align: center;
    font-size: clamp(9px, 3vw, 10.5px);
    line-height: 1.6;
    margin-top: 32px;
  }

  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

  <div id="enter-screen" class="screen">
    <button id="enter-btn">Entrée</button>
  </div>

  <div id="pass-screen" class="screen">
    <div class="lock">Accès réservé aux membres</div>
    <input id="pass-input" type="password" placeholder="••••••" autocomplete="off" spellcheck="false">
    <button id="connect-btn">Se connecter</button>
    <div id="pass-hint" aria-live="polite"></div>
  </div>

  <div id="member-screen" class="screen">
    <h1>Elite</h1>
    <p>Accès accordé</p>
    <button id="locate-btn">Ouvrir le Terminal</button>
    <section id="terminal" class="terminal">
      <div class="terminal-bar"><i></i><i></i><i></i></div>
      <span id="terminal-output"></span><span class="cursor"></span>
    </section>
    <p class="privacy">Interface sécurisée • Aucune donnée collectée</p>
  </div>

<script>
  const PASSWORD = "elite2026";
  const $ = id => document.getElementById(id);

  const enterScreen = $("enter-screen");
  const enterBtn = $("enter-btn");
  const passScreen = $("pass-screen");
  const passInput = $("pass-input");
  const connectBtn = $("connect-btn");
  const passHint = $("pass-hint");
  const memberScreen = $("member-screen");
  const locateBtn = $("locate-btn");
  const output = $("terminal-output");

  const wait = ms => new Promise(r => setTimeout(r, ms));

  async function typeLine(text, speed = 18) {
    for (let char of text) {
      output.textContent += char;
      await wait(speed + Math.random() * 20);
    }
    output.textContent += "\n";
  }

  // Animation améliorée : zoom + écran noir 1.2s
  enterBtn.addEventListener("click", () => {
    // Zoom progressif
    enterScreen.style.transition = "transform 1.5s cubic-bezier(0.55, 0, 0.1, 1), opacity 1.3s ease";
    enterScreen.style.transform = "scale(14)";
    enterScreen.style.opacity = "0";

    // Passage au noir
    setTimeout(() => {
      document.body.style.background = "#000";
      enterScreen.style.color = "#fff";
    }, 300);

    // Durée écran noir ≈ 1.2s
    setTimeout(() => {
      enterScreen.style.display = "none";
      document.body.style.background = "#fff";
      passScreen.classList.add("show");
      passInput.focus();
    }, 1550); // 1.55s total pour un bon timing
  });

  function tryPassword() {
    if (passInput.value === PASSWORD) {
      passScreen.classList.remove("show");
      setTimeout(() => {
        passScreen.style.display = "none";
        memberScreen.classList.add("show");
      }, 900);
    } else {
      passInput.classList.add("error");
      passHint.textContent = "Clé d'accès invalide";
      passInput.value = "";
      setTimeout(() => { 
        passInput.classList.remove("error"); 
        passHint.textContent = ""; 
      }, 1600);
    }
  }

  connectBtn.addEventListener("click", tryPassword);
  passInput.addEventListener("keydown", e => { if (e.key === "Enter") tryPassword(); });

  locateBtn.addEventListener("click", async () => {
    locateBtn.disabled = true;
    locateBtn.textContent = "Initialisation...";
    output.textContent = "";

    await typeLine("> Connexion au réseau sécurisé...", 16);
    await wait(400);
    await typeLine("> Authentification biométrique...", 20);
    await typeLine("STATUT : VALIDÉ", 24);
    await typeLine("> Accès complet accordé", 22);
    await wait(350);
    await typeLine("Bienvenue dans le système Elite.", 26);

    locateBtn.textContent = "Rafraîchir Terminal";
    locateBtn.disabled = false;
  });
</script>
</body>
</html>
