<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Elite</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: #000;
    color: #fff;
    font-family: "Helvetica Neue", Arial, sans-serif;
    overflow: hidden;
    cursor: default;
  }

  /* ---- Compteur de connectés (caché tant qu'on n'est pas entré) ---- */
  #live {
    position: fixed;
    bottom: 22px;
    right: 26px;
    z-index: 60;
    font-size: 13px;
    letter-spacing: 0.5px;
    color: #555;
    user-select: none;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
  }
  #live.show { opacity: 1; }
  #live .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #1db954;
    margin-right: 8px;
    vertical-align: middle;
    box-shadow: 0 0 8px #1db954;
    animation: pulse 1.8s infinite;
  }
  #live b { color: #aaa; font-weight: 600; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: .25; }
  }

  /* ---- Écrans ---- */
  .screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Écran 1 : bouton ENTRÉE (petit, propre) */
  #enter-screen {
    transition: transform 2.5s cubic-bezier(.5,0,.2,1), opacity 2s ease, filter 2.5s ease;
  }
  #enter-screen.fall {
    transform: scale(9) translateZ(0);
    opacity: 0;
    filter: blur(14px);
  }

  #enter-btn {
    position: relative;
    background: transparent;
    border: 1px solid rgba(255,255,255,.22);
    color: #eaeaea;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 9px;
    padding: 16px 42px 16px 51px;
    border-radius: 40px;
    cursor: pointer;
    text-transform: uppercase;
    overflow: hidden;
    z-index: 0;
    transition: color .5s ease, border-color .5s ease, letter-spacing .5s ease;
  }
  /* le blanc qui remplit au survol */
  #enter-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: #fff;
    transform: scaleX(0);
    transform-origin: left center;
    transition: transform .5s cubic-bezier(.7,0,.2,1);
    z-index: -1;
  }
  #enter-btn span { position: relative; }
  #enter-btn:hover {
    color: #000;
    border-color: #fff;
    letter-spacing: 12px;
  }
  #enter-btn:hover::before { transform: scaleX(1); }

  /* ---- Fumée noire pendant la chute ---- */
  #smoke {
    position: fixed;
    inset: -30%;
    z-index: 40;
    pointer-events: none;
    opacity: 0;
    filter: blur(6px);
    background:
      radial-gradient(circle at 50% 62%, rgba(28,28,30,1), rgba(14,14,16,.85) 30%, rgba(0,0,0,0) 62%),
      radial-gradient(circle at 28% 38%, rgba(45,45,48,.9), rgba(0,0,0,0) 50%),
      radial-gradient(circle at 74% 44%, rgba(38,38,42,.9), rgba(0,0,0,0) 52%),
      radial-gradient(circle at 60% 78%, rgba(22,22,24,.95), rgba(0,0,0,0) 55%);
  }
  #smoke.burst { animation: smoke 2.5s ease forwards; }
  @keyframes smoke {
    0%   { opacity: 0;  transform: scale(.5)  rotate(0deg);   filter: blur(14px); }
    25%  { opacity: 1;  transform: scale(1.1) rotate(8deg);   filter: blur(4px); }
    60%  { opacity: 1;  transform: scale(1.6) rotate(-6deg);  filter: blur(6px); }
    100% { opacity: 0;  transform: scale(2.3) rotate(10deg);  filter: blur(20px); }
  }
  /* deuxième nappe pour la turbulence */
  #smoke::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 40% 55%, rgba(50,50,54,.7), rgba(0,0,0,0) 45%),
      radial-gradient(circle at 66% 60%, rgba(30,30,34,.8), rgba(0,0,0,0) 48%);
  }
  #smoke.burst::after { animation: smoke2 2.5s ease forwards; }
  @keyframes smoke2 {
    0%   { opacity: 0; transform: scale(.7) rotate(0deg); }
    40%  { opacity: .9; transform: scale(1.3) rotate(-12deg); }
    100% { opacity: 0; transform: scale(2) rotate(14deg); }
  }

  /* Écran 2 : connexion — arrive comme un ascenseur (par le bas) */
  #pass-screen {
    opacity: 0;
    pointer-events: none;
    transform: translateY(100%);
    transition: opacity .8s ease, transform 1.1s cubic-bezier(.16,1,.3,1);
  }
  #pass-screen.show {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }

  .lock {
    font-size: 10px;
    letter-spacing: 8px;
    color: #4a4a4a;
    text-transform: uppercase;
    margin-bottom: 40px;
    font-weight: 300;
  }
  /* Champ mot de passe — pilule nette assortie au bouton */
  #pass-input {
    background: transparent;
    border: 1px solid rgba(255,255,255,.18);
    color: #fff;
    font-size: 17px;
    font-weight: 300;
    letter-spacing: 10px;
    text-align: center;
    padding: 17px 26px;
    width: min(340px, 80vw);
    border-radius: 40px;
    outline: none;
    transition: border-color .4s ease;
  }
  #pass-input::placeholder { color: #333; letter-spacing: 5px; }
  #pass-input:focus { border-color: rgba(255,255,255,.6); }
  #pass-input.error {
    border-color: rgba(170,60,52,.85);
    animation: shake .4s;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-7px)}
    75%{transform:translateX(7px)}
  }
  /* Bouton Se connecter — même remplissage net que Entrée */
  #connect-btn {
    position: relative;
    margin-top: 34px;
    background: transparent;
    border: 1px solid rgba(255,255,255,.22);
    color: #eaeaea;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 6px;
    text-transform: uppercase;
    padding: 15px 40px;
    border-radius: 40px;
    cursor: pointer;
    overflow: hidden;
    z-index: 0;
    transition: color .5s ease, border-color .5s ease, letter-spacing .5s ease;
  }
  #connect-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    background: #fff;
    transform: scaleX(0);
    transform-origin: left center;
    transition: transform .5s cubic-bezier(.7,0,.2,1);
    z-index: -1;
  }
  #connect-btn span {
    position: relative;
    display: inline-block;
    transition: transform .4s ease;
    margin-left: 10px;
  }
  #connect-btn:hover {
    color: #000;
    border-color: #fff;
    letter-spacing: 9px;
  }
  #connect-btn:hover::before { transform: scaleX(1); }
  #connect-btn:hover span { transform: translateX(6px); }
  #pass-hint {
    margin-top: 22px;
    font-size: 10px;
    letter-spacing: 3px;
    color: #6a2a26;
    text-transform: uppercase;
    height: 14px;
  }

  /* Écran 3 : accès accordé */
  #member-screen {
    opacity: 0;
    pointer-events: none;
    transition: opacity 1.2s ease;
  }
  #member-screen.show { opacity: 1; pointer-events: auto; }
  #member-screen h1 {
    font-weight: 200;
    font-size: clamp(34px, 7vw, 80px);
    letter-spacing: 14px;
    text-transform: uppercase;
  }
  #member-screen p {
    margin-top: 18px;
    color: #555;
    letter-spacing: 4px;
    font-size: 13px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

  <!-- Compteur de connectés (apparaît après l'entrée) -->
  <div id="live"><span class="dot"></span><b id="live-count">0</b> connectés</div>

  <!-- Fumée -->
  <div id="smoke"></div>

  <!-- Écran 1 -->
  <div id="enter-screen" class="screen">
    <button id="enter-btn"><span>Entrée</span></button>
  </div>

  <!-- Écran 2 : connexion -->
  <div id="pass-screen" class="screen">
    <div class="lock">Accès réservé aux membres</div>
    <input id="pass-input" type="password" placeholder="• • • • • •" autocomplete="off" spellcheck="false">
    <button id="connect-btn">Se connecter<span>&rarr;</span></button>
    <div id="pass-hint"></div>
  </div>

  <!-- Écran 3 : membre -->
  <div id="member-screen" class="screen">
    <h1>Crypto Elite</h1>
    <p>Accès accordé</p>
  </div>

<script>
  /* ===== MOT DE PASSE MEMBRES — change-le ici ===== */
  const PASSWORD = "elite2026";

  /* ===== Compteur de connectés (réaliste, plage 16085 -> 21684) ===== */
  const liveBox = document.getElementById("live");
  const liveEl  = document.getElementById("live-count");
  const LIVE_MIN = 16085, LIVE_MAX = 21684;
  function randInt(min, max){ return Math.floor(Math.random() * (max - min + 1)) + min; }

  let liveCount = randInt(LIVE_MIN, LIVE_MAX);   // valeur de départ
  function updateLive(){
    // quelques personnes se connectent / se déconnectent à chaque tic
    let delta = randInt(-18, 18);
    // léger rappel vers le centre pour ne pas coller aux bords
    const mid = (LIVE_MIN + LIVE_MAX) / 2;
    if (liveCount > mid) delta -= randInt(0, 3);
    else                 delta += randInt(0, 3);

    liveCount += delta;
    if (liveCount < LIVE_MIN) liveCount = LIVE_MIN + randInt(0, 8);
    if (liveCount > LIVE_MAX) liveCount = LIVE_MAX - randInt(0, 8);

    liveEl.textContent = liveCount.toLocaleString("fr-FR");
  }
  liveEl.textContent = liveCount.toLocaleString("fr-FR");
  setInterval(updateLive, 1800);

  /* ===== Éléments ===== */
  const enterScreen = document.getElementById("enter-screen");
  const enterBtn    = document.getElementById("enter-btn");
  const smoke       = document.getElementById("smoke");
  const passScreen  = document.getElementById("pass-screen");
  const passInput   = document.getElementById("pass-input");
  const connectBtn  = document.getElementById("connect-btn");
  const passHint    = document.getElementById("pass-hint");
  const memberScreen= document.getElementById("member-screen");

  /* ===== ENTRÉE -> chute + fumée (2.5s) -> ascenseur -> connexion ===== */
  enterBtn.addEventListener("click", () => {
    enterScreen.classList.add("fall");   // on tombe
    smoke.classList.add("burst");        // fumée blanche
    setTimeout(() => {
      enterScreen.style.display = "none";
      passScreen.classList.add("show");  // l'ascenseur arrive
      liveBox.classList.add("show");     // on voit enfin les connectés
      passInput.focus();
    }, 2500);
  });

  /* ===== Vérification du mot de passe ===== */
  function tryPassword(){
    if (passInput.value === PASSWORD) {
      passScreen.classList.remove("show");
      setTimeout(() => {
        passScreen.style.display = "none";
        memberScreen.classList.add("show");
      }, 800);
    } else {
      passInput.classList.add("error");
      passHint.textContent = "Mot de passe incorrect";
      passInput.value = "";
      setTimeout(() => passInput.classList.remove("error"), 400);
    }
  }
  connectBtn.addEventListener("click", tryPassword);
  passInput.addEventListener("keydown", e => {
    if (e.key === "Enter") tryPassword();
    else passHint.textContent = "";
  });
</script>
</body>
</html>
